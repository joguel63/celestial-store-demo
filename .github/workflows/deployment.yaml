name: Deploy Frontend

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: joguel63/github-actions-templates/.github/workflows/deploy-s3-cloudfront.yml@v1
    with:
      node-version: '20'
      package-manager: 'yarn'
      build-command: 'yarn build'
      dist-folder: 'dist'
      s3-bucket: 'portfolio-projects-container'
      s3-prefix: 'Celestial Menagerie'
      aws-region: 'us-east-1'
      cloudfront-distribution-id: 'E3RZXNMXFR7F5L'